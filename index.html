<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GI Technology</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#0a0f1f;
  color:white;
}

/* HERO EXEMPLO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero h1{
  font-size:42px;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  margin-top:15px;
  font-size:18px;
  opacity:0.8;
}

/* ================= CHAT PREMIUM GI TECH ================= */

/* BOTÃO */
#chatButton{
  position:fixed;
  bottom:25px;
  right:25px;
  width:72px;
  height:72px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  overflow:hidden;
  z-index:9999;
  opacity:0;
  transform:translateY(30px) scale(0.9);
  transition:0.4s ease;
  box-shadow:0 10px 30px rgba(0,140,255,0.4);
}

#chatButton.show{
  opacity:1;
  transform:translateY(0) scale(1);
}

#chatButton img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
  transition:0.3s;
}

#chatButton:hover{
  transform:scale(1.08);
  box-shadow:0 15px 40px rgba(0,140,255,0.7);
}

/* BOLINHA ONLINE */
#chatButton::after{
  content:"";
  position:absolute;
  bottom:6px;
  right:6px;
  width:15px;
  height:15px;
  background:#00ff66;
  border-radius:50%;
  border:3px solid #0a0f1f;
}

/* BALÃO */
#chatBubble{
  position:fixed;
  bottom:115px;
  right:25px;
  background:white;
  color:#111;
  padding:14px 18px;
  border-radius:18px;
  font-size:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  z-index:9999;
  opacity:0;
  transform:translateY(15px);
  transition:0.4s ease;
}

#chatBubble.show{
  opacity:1;
  transform:translateY(0);
}

.typing span{
  animation:blink 1.4s infinite both;
}

.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
  0%{opacity:.2}
  20%{opacity:1}
  100%{opacity:.2}
}

/* CHAT FRAME */
#chatFrame{
  position:fixed;
  bottom:110px;
  right:25px;
  width:370px;
  height:520px;
  border:none;
  border-radius:18px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  opacity:0;
  transform:scale(0.8);
  transition:0.3s ease;
  z-index:9999;
  pointer-events:none;
}

#chatFrame.open{
  opacity:1;
  transform:scale(1);
  pointer-events:auto;
}

@media(max-width:768px){
  #chatFrame{
    width:94%;
    right:3%;
    height:70%;
  }
}

</style>
</head>

<body>

<div class="hero">
  <h1>GI Technology</h1>
  <p>Soluções em Sites, Sistemas e Inteligência Artificial</p>
</div>

<!-- BALÃO -->
<div id="chatBubble">
  <strong>GI Tech</strong> está online<br>
  <span class="typing">
    digitando<span>.</span><span>.</span><span>.</span>
  </span>
</div>

<!-- BOTÃO -->
<button id="chatButton">
  <img src="https://i.postimg.cc/XJ3Z3r1Z/37F86CB4-66CF-4F9E-A917-4A0B25CF7C75.png" alt="Assistente Virtual GI Tech">
</button>

<!-- CHAT BOT -->
<iframe
  id="chatFrame"
  src="https://cdn.botpress.cloud/webchat/v3.6/shareable.html?configUrl=https://files.bpcontent.cloud/2026/03/04/23/20260304232304-ZKJ43EGK.json&locale=pt-BR&placeholder=Digite%20sua%20mensagem...">
</iframe>

<script>

const button = document.getElementById("chatButton");
const bubble = document.getElementById("chatBubble");
const chat = document.getElementById("chatFrame");

/* Entrada suave */
window.addEventListener("load",()=>{
  setTimeout(()=> button.classList.add("show"),800);
  setTimeout(()=> bubble.classList.add("show"),2000);
  setTimeout(()=> bubble.classList.remove("show"),8000);
});

/* Abrir chat */
button.addEventListener("click",()=>{
  chat.classList.toggle("open");
  bubble.classList.remove("show");
});

/* Pulso inteligente */
let pulseCount = 0;
const pulseInterval = setInterval(()=>{
  if(pulseCount < 2){
    button.style.boxShadow="0 0 0 20px rgba(0,140,255,0.1)";
    setTimeout(()=>{
      button.style.boxShadow="0 10px 30px rgba(0,140,255,0.4)";
    },300);
    pulseCount++;
  } else {
    clearInterval(pulseInterval);
  }
},1500);

</script>

</body>
</html>
